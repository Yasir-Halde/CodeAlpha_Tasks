<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
}

.filter-btns {
    margin: 20px;
}

.filter-btns button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    background: #444;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    border-radius: 5px;
}

.filter-btns button:hover {
    background: orange;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    cursor: pointer;
    border-radius: 10px;
    transition: transform 0.4s ease, filter 0.4s ease;
}

.gallery img:hover {
    transform: scale(1.05);
    filter: brightness(70%);
}

.lightbox {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background:black;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.lightbox img {
    max-width: 80%;
    max-height: 70%;
    border-radius: 10px;
    transition: 0.4s;
}

.lightbox button {
    position: absolute;
    background: black;
    border: none;
    color: white;
    font-size: 30px;
    padding: 10px 20px;
    cursor: pointer;
}

.prev { left: 5%; }
.next { right: 5%; }
.close { top: 20px; right: 20px; font-size: 25px; }

@media (max-width: 600px) {
    .gallery img {
        height: 150px;
    }
}
</style>
</head>

<body>

<h1>Responsive Image Gallery</h1>

<div class="filter-btns">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery">
    <img src="https://picsum.photos/id/1018/600/400" class="nature">
    <img src="https://picsum.photos/id/1015/600/400" class="nature">
    <img src="https://picsum.photos/id/1011/600/400" class="nature">
    <img src="https://picsum.photos/id/1012/600/400" class="city">
    <img src="https://picsum.photos/id/1016/600/400" class="city">
    <img src="https://picsum.photos/id/1020/600/400" class="city">
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="close" onclick="closeLightbox()">X</button>
    <button class="prev" onclick="changeImage(-1)">❮</button>
    <img id="lightbox-img">
    <button class="next" onclick="changeImage(1)">❯</button>
</div>

<script>
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

let currentIndex = 0;

// Open Lightbox
images.forEach((img, index) => {
    img.addEventListener("click", () => {
        lightbox.style.display = "flex";
        lightboxImg.src = img.src;
        currentIndex = index;
    });
});

// Close Lightbox
function closeLightbox() {
    lightbox.style.display = "none";
}

// Change Image (Next/Prev)
function changeImage(direction) {
    currentIndex += direction;

    if (currentIndex < 0) {
        currentIndex = images.length - 1;
    }
    if (currentIndex >= images.length) {
        currentIndex = 0;
    }

    lightboxImg.src = images[currentIndex].src;
}

// Filter Images
function filterImages(category) {
    images.forEach(img => {
        if (category === "all" || img.classList.contains(category)) {
            img.style.display = "block";
        } else {
            img.style.display = "none";
        }
    });
}

// Close on outside click
lightbox.addEventListener("click", (e) => {
    if (e.target !== lightboxImg) {
        closeLightbox();
    }
});
</script>

</body>
</html>
